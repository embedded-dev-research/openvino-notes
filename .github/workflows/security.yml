name: Security

on:
  workflow_call:

env:
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  JAVA_VERSION: "17"

jobs:
  secrets:
    name: Secrets
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        shell: bash
        run: |
          mkdir -p build/reports/gitleaks
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path build/reports/gitleaks/gitleaks.sarif \
            --redact

      - name: Upload gitleaks SARIF
        if: always() && hashFiles('build/reports/gitleaks/gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/gitleaks/gitleaks.sarif
          category: gitleaks

      - name: Upload secrets artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: secret-reports
          if-no-files-found: ignore
          path: build/reports/gitleaks/**
