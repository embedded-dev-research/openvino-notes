name: PR Report

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: write

jobs:
  report:
    name: Report Results To PR
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0] != null &&
      github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download workflow artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: pr-artifacts

      - name: List downloaded artifacts
        shell: bash
        run: bash .github/scripts/pr/list_downloaded_artifacts.sh pr-artifacts

      - name: Detect coverage reports
        id: coverage-reports
        shell: bash
        run: |
          aggregate=false
          modules=false
          if [[ -f pr-artifacts/build/reports/kover/report.xml ]]; then
            aggregate=true
          fi
          echo "aggregate=$aggregate" >> "$GITHUB_OUTPUT"

          for module in ai app data domain; do
            present=false
            if [[ -f "pr-artifacts/$module/build/reports/kover/report.xml" ]]; then
              present=true
              modules=true
            fi
            echo "$module=$present" >> "$GITHUB_OUTPUT"
          done

          echo "modules=$modules" >> "$GITHUB_OUTPUT"

      - name: Publish unit test report
        if: hashFiles('pr-artifacts/**/build/test-results/testDebugUnitTest/*.xml') != ''
        continue-on-error: true
        uses: mikepenz/action-junit-report@v6.3.1
        with:
          commit: ${{ github.event.workflow_run.head_sha }}
          pr_id: ${{ github.event.workflow_run.pull_requests[0].number }}
          check_name: Unit Tests
          report_paths: pr-artifacts/**/build/test-results/testDebugUnitTest/*.xml
          require_tests: true
          fail_on_failure: false
          update_check: true
          detailed_summary: true

      - name: Publish instrumentation report
        if: hashFiles('pr-artifacts/**/instrumentation-results.xml') != ''
        continue-on-error: true
        uses: mikepenz/action-junit-report@v6.3.1
        with:
          commit: ${{ github.event.workflow_run.head_sha }}
          pr_id: ${{ github.event.workflow_run.pull_requests[0].number }}
          check_name: Android Instrumentation
          report_paths: pr-artifacts/**/instrumentation-results.xml
          require_tests: true
          fail_on_failure: false
          update_check: true
          detailed_summary: true

      - name: Load quality monitor coverage config
        if: steps.coverage-reports.outputs.aggregate == 'true'
        id: quality-monitor-config
        shell: bash
        run: |
          {
            echo 'json<<EOF'
            cat .github/quality-monitor/coverage-config.json
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Publish coverage report
        if: steps.coverage-reports.outputs.aggregate == 'true'
        continue-on-error: true
        uses: uhafner/quality-monitor@v4.7.1
        with:
          pr-number: ${{ github.event.workflow_run.pull_requests[0].number }}
          sha: ${{ github.event.workflow_run.head_sha }}
          github-token: ${{ github.token }}
          checks-name: Coverage
          title-metric: line
          show-headers: true
          skip-annotations: true
          config: ${{ steps.quality-monitor-config.outputs.json }}

      - name: Load AI coverage annotations config
        if: steps.coverage-reports.outputs.ai == 'true'
        id: coverage-annotations-ai-config
        shell: bash
        run: |
          {
            echo 'json<<EOF'
            cat .github/autograding/coverage-annotations-ai.json
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Publish AI coverage annotations
        if: steps.coverage-reports.outputs.ai == 'true'
        continue-on-error: true
        uses: uhafner/autograding-github-action@v6.0.1
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          github-token: ${{ github.token }}
          checks-name: AI Coverage Annotations
          max-coverage-annotations: 200
          config: ${{ steps.coverage-annotations-ai-config.outputs.json }}

      - name: Load App coverage annotations config
        if: steps.coverage-reports.outputs.app == 'true'
        id: coverage-annotations-app-config
        shell: bash
        run: |
          {
            echo 'json<<EOF'
            cat .github/autograding/coverage-annotations-app.json
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Publish App coverage annotations
        if: steps.coverage-reports.outputs.app == 'true'
        continue-on-error: true
        uses: uhafner/autograding-github-action@v6.0.1
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          github-token: ${{ github.token }}
          checks-name: App Coverage Annotations
          max-coverage-annotations: 200
          config: ${{ steps.coverage-annotations-app-config.outputs.json }}

      - name: Load Data coverage annotations config
        if: steps.coverage-reports.outputs.data == 'true'
        id: coverage-annotations-data-config
        shell: bash
        run: |
          {
            echo 'json<<EOF'
            cat .github/autograding/coverage-annotations-data.json
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Publish Data coverage annotations
        if: steps.coverage-reports.outputs.data == 'true'
        continue-on-error: true
        uses: uhafner/autograding-github-action@v6.0.1
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          github-token: ${{ github.token }}
          checks-name: Data Coverage Annotations
          max-coverage-annotations: 200
          config: ${{ steps.coverage-annotations-data-config.outputs.json }}

      - name: Load Domain coverage annotations config
        if: steps.coverage-reports.outputs.domain == 'true'
        id: coverage-annotations-domain-config
        shell: bash
        run: |
          {
            echo 'json<<EOF'
            cat .github/autograding/coverage-annotations-domain.json
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Publish Domain coverage annotations
        if: steps.coverage-reports.outputs.domain == 'true'
        continue-on-error: true
        uses: uhafner/autograding-github-action@v6.0.1
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          github-token: ${{ github.token }}
          checks-name: Domain Coverage Annotations
          max-coverage-annotations: 200
          config: ${{ steps.coverage-annotations-domain-config.outputs.json }}

      - name: Build coverage details comment
        if: steps.coverage-reports.outputs.aggregate == 'true'
        shell: bash
        run: |
          python3 .github/scripts/quality/build_coverage_summary.py \
            pr-artifacts \
            coverage-details.md

      - name: Publish coverage details comment
        if: steps.coverage-reports.outputs.aggregate == 'true'
        uses: marocchino/sticky-pull-request-comment@v3.0.2
        with:
          number: ${{ github.event.workflow_run.pull_requests[0].number }}
          header: coverage-details
          path: coverage-details.md

      - name: Build uncovered coverage comment
        if: steps.coverage-reports.outputs.modules == 'true'
        shell: bash
        run: |
          python3 .github/scripts/quality/build_uncovered_coverage_comment.py \
            pr-artifacts \
            coverage-uncovered.md \
            "${{ github.repository }}" \
            "${{ github.event.workflow_run.head_sha }}"

      - name: Publish uncovered coverage comment
        if: steps.coverage-reports.outputs.modules == 'true'
        uses: marocchino/sticky-pull-request-comment@v3.0.2
        with:
          number: ${{ github.event.workflow_run.pull_requests[0].number }}
          header: coverage-uncovered
          path: coverage-uncovered.md

      - name: Build PR summary
        shell: bash
        run: |
          python3 .github/scripts/pr/build_pr_summary.py \
            pr-artifacts \
            pr-summary.md \
            "${{ github.event.workflow_run.pull_requests[0].number }}" \
            "${{ github.event.workflow_run.head_sha }}" \
            "${{ github.event.workflow_run.html_url }}" \
            "${{ github.event.workflow_run.conclusion }}"

      - name: Publish sticky PR summary
        uses: marocchino/sticky-pull-request-comment@v3.0.2
        with:
          number: ${{ github.event.workflow_run.pull_requests[0].number }}
          header: ci-quality-overview
          path: pr-summary.md
