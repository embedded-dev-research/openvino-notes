name: Android Tests

on:
  workflow_call:

env:
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  JAVA_VERSION: "17"

jobs:
  emulator-validation:
    name: Emulator Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Validate debug APK tasks
        shell: bash
        run: |
          ./gradlew \
            app:assembleDebug \
            app:assembleDebugAndroidTest \
            -m \
            --stacktrace

  android-tests:
    name: Android Tests (build=${{ matrix.build_name }}, emulator=${{ matrix.emulator_name }})
    needs: emulator-validation
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - build_name: x86_64
            build_artifact: debug-apks-x86_64
            emulator_name: x86_64
            runs_on: ubuntu-24.04
            api_level: 34
            target: default
            arch: x86_64
            profile: pixel_7
            emulator_options: -no-snapshot-save -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect -camera-back none -camera-front none
            test_suffix: x86-on-x86
          - build_name: x86_64
            build_artifact: debug-apks-x86_64
            emulator_name: arm64
            runs_on: macos-15
            api_level: 34
            target: default
            arch: arm64-v8a
            profile: pixel_7
            emulator_options: -no-snapshot-save -no-window -noaudio -no-boot-anim -camera-back none -camera-front none
            test_suffix: x86-on-arm
          - build_name: arm64
            build_artifact: debug-apks-arm64
            emulator_name: x86_64
            runs_on: ubuntu-24.04
            api_level: 34
            target: default
            arch: x86_64
            profile: pixel_7
            emulator_options: -no-snapshot-save -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect -camera-back none -camera-front none
            test_suffix: arm-on-x86
          - build_name: arm64
            build_artifact: debug-apks-arm64
            emulator_name: arm64
            runs_on: macos-15
            api_level: 34
            target: default
            arch: arm64-v8a
            profile: pixel_7
            emulator_options: -no-snapshot-save -no-window -noaudio -no-boot-anim -camera-back none -camera-front none
            test_suffix: arm-on-arm
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 45
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.build_artifact }}
          path: build-artifacts/${{ matrix.build_name }}

      - name: Enable KVM when available
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [ -e /dev/kvm ]; then
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
          else
            echo "/dev/kvm is not available on this runner"
          fi

      - name: Run instrumentation on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api_level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          profile: ${{ matrix.profile }}
          disable-animations: true
          emulator-options: ${{ matrix.emulator_options }}
          script: |
            set -euo pipefail

            APK_DIR="build-artifacts/${{ matrix.build_name }}"
            APP_APK="$(find "$APK_DIR" -name 'app-debug.apk' | head -n 1)"
            TEST_APK="$(find "$APK_DIR" -name 'app-debug-androidTest.apk' | head -n 1)"

            if [ -z "$APP_APK" ] || [ -z "$TEST_APK" ]; then
              echo "Missing APK artifacts in $APK_DIR"
              exit 1
            fi

            adb wait-for-device
            adb shell settings put global window_animation_scale 0 || true
            adb shell settings put global transition_animation_scale 0 || true
            adb shell settings put global animator_duration_scale 0 || true
            adb logcat -c
            adb install -r "$APP_APK"
            adb install -r "$TEST_APK"
            adb shell am instrument -w com.itlab.notes.test/androidx.test.runner.AndroidJUnitRunner | tee instrumentation-raw.txt
            adb logcat -d > logcat.txt || true

      - name: Convert instrumentation output to JUnit
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import xml.etree.ElementTree as ET

          raw_path = pathlib.Path("instrumentation-raw.txt")
          if not raw_path.exists():
            raise SystemExit("instrumentation-raw.txt was not generated")

          raw = raw_path.read_text()
          suite = ET.Element("testsuite", name="androidTest", tests="0", failures="0", errors="0", skipped="0")
          tests = failures = 0
          current_class = "unknown"
          current_test = "unknown"
          current_stack = ""

          for line in raw.splitlines():
            line = line.strip()
            m_class = re.match(r"INSTRUMENTATION_STATUS: class=(.+)", line)
            m_test = re.match(r"INSTRUMENTATION_STATUS: test=(.+)", line)
            m_stack = re.match(r"INSTRUMENTATION_STATUS: stack=(.+)", line)
            m_code = re.match(r"INSTRUMENTATION_STATUS_CODE: (-?\\d+)", line)

            if m_class:
              current_class = m_class.group(1)
            elif m_test:
              current_test = m_test.group(1)
            elif m_stack:
              current_stack = m_stack.group(1)
            elif m_code:
              code = int(m_code.group(1))
              if code in (0, -2):
                tests += 1
                testcase = ET.SubElement(
                  suite,
                  "testcase",
                  classname=current_class,
                  name=current_test,
                )
                if code == -2:
                  failures += 1
                  failure = ET.SubElement(testcase, "failure", message="Instrumentation failure")
                  failure.text = current_stack or "Unknown instrumentation failure"
                  current_stack = ""

          suite.set("tests", str(tests))
          suite.set("failures", str(failures))
          tree = ET.ElementTree(suite)
          ET.indent(tree, space="  ")
          tree.write("instrumentation-results.xml", encoding="utf-8", xml_declaration=True)
          pathlib.Path("instrumentation.txt").write_text(raw)
          PY

      - name: Upload android test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-test-reports-${{ matrix.test_suffix }}
          if-no-files-found: ignore
          path: |
            emulator.log
            instrumentation.txt
            instrumentation-results.xml
            logcat.txt

      - name: Publish instrumentation report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          check_name: Android Tests (${{ matrix.test_suffix }})
          report_paths: instrumentation-results.xml
          require_tests: true
          fail_on_failure: true
