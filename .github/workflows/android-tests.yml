name: Android Tests

on:
  workflow_call:

env:
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  JAVA_VERSION: "17"

jobs:
  managed-device-validation:
    name: Managed Device Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Validate managed device tasks
        shell: bash
        run: |
          ./gradlew \
            app:pixel7api34X86DebugAndroidTest \
            app:pixel7api34Arm64DebugAndroidTest \
            -m \
            --stacktrace

  android-tests:
    name: Android Tests (${{ matrix.name }})
    needs: managed-device-validation
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: x86_64
            runs_on: ubuntu-24.04
            system_image: system-images;android-34;aosp_atd;x86_64
            gradle_task: app:pixel7api34X86DebugAndroidTest
          - name: arm64
            runs_on: ubuntu-24.04-arm
            system_image: system-images;android-34;aosp_atd;arm64-v8a
            gradle_task: app:pixel7api34Arm64DebugAndroidTest
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}
          install-system-image: "true"
          android-system-image: ${{ matrix.system_image }}

      - name: Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Managed device tests
        shell: bash
        run: |
          ./gradlew \
            ${{ matrix.gradle_task }} \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            --stacktrace

      - name: Upload android test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-test-reports-${{ matrix.name }}
          if-no-files-found: ignore
          path: |
            **/build/reports/androidTests/**
            **/build/outputs/androidTest-results/**
