name: Quality

on:
  workflow_call:

env:
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  JAVA_VERSION: "17"

jobs:
  quality-foundation:
    name: Quality Foundation
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Format, static analysis, and lint
        shell: bash
        run: |
          ./gradlew \
            ktlintCheck \
            detekt \
            ai:lintDebug \
            app:lintDebug \
            data:lintDebug \
            domain:lintDebug \
            --stacktrace

      - name: Publish lint and static analysis summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Quality Foundation"
            echo
            echo "- ktlint, detekt, and Android lint executed"
            echo "- Detekt findings are uploaded to Code Scanning"
            echo "- Lint XML/HTML reports are attached as workflow artifacts"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload detekt SARIF for ai
        if: always() && hashFiles('ai/build/reports/detekt/detekt.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ai/build/reports/detekt/detekt.sarif
          category: detekt-ai

      - name: Upload detekt SARIF for app
        if: always() && hashFiles('app/build/reports/detekt/detekt.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: app/build/reports/detekt/detekt.sarif
          category: detekt-app

      - name: Upload detekt SARIF for data
        if: always() && hashFiles('data/build/reports/detekt/detekt.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: data/build/reports/detekt/detekt.sarif
          category: detekt-data

      - name: Upload detekt SARIF for domain
        if: always() && hashFiles('domain/build/reports/detekt/detekt.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: domain/build/reports/detekt/detekt.sarif
          category: detekt-domain

      - name: Upload foundation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-foundation-reports
          if-no-files-found: ignore
          path: |
            **/build/reports/detekt/**
            **/build/reports/ktlint/**
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml

  build-quality-x86:
    name: Build Quality (x86_64)
    needs: quality-foundation
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Debug build and unit tests
        shell: bash
        run: |
          ./gradlew \
            ai:assembleDebug \
            app:assembleDebug \
            app:assembleDebugAndroidTest \
            data:assembleDebug \
            domain:assembleDebug \
            ai:testDebugUnitTest \
            app:testDebugUnitTest \
            data:testDebugUnitTest \
            domain:testDebugUnitTest \
            --stacktrace

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-build-reports-x86_64
          if-no-files-found: ignore
          path: |
            **/build/reports/tests/**
            **/build/outputs/unit_test_code_coverage/**

      - name: Publish unit test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          check_name: Unit Tests (x86_64)
          report_paths: |
            ai/build/test-results/testDebugUnitTest/*.xml
            app/build/test-results/testDebugUnitTest/*.xml
            data/build/test-results/testDebugUnitTest/*.xml
            domain/build/test-results/testDebugUnitTest/*.xml
          require_tests: true
          fail_on_failure: true

      - name: Upload debug APK artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-apks-x86_64
          if-no-files-found: error
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk

  build-quality-arm64:
    name: Build Quality (arm64)
    needs: quality-foundation
    runs-on: macos-15
    timeout-minutes: 35
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Debug build and unit tests
        shell: bash
        run: |
          ./gradlew \
            ai:assembleDebug \
            app:assembleDebug \
            app:assembleDebugAndroidTest \
            data:assembleDebug \
            domain:assembleDebug \
            ai:testDebugUnitTest \
            app:testDebugUnitTest \
            data:testDebugUnitTest \
            domain:testDebugUnitTest \
            --stacktrace

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-build-reports-arm64
          if-no-files-found: ignore
          path: |
            **/build/reports/tests/**
            **/build/outputs/unit_test_code_coverage/**

      - name: Publish unit test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          check_name: Unit Tests (arm64)
          report_paths: |
            ai/build/test-results/testDebugUnitTest/*.xml
            app/build/test-results/testDebugUnitTest/*.xml
            data/build/test-results/testDebugUnitTest/*.xml
            domain/build/test-results/testDebugUnitTest/*.xml
          require_tests: true
          fail_on_failure: true

      - name: Upload debug APK artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-apks-arm64
          if-no-files-found: error
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk

  coverage:
    name: Coverage
    needs: quality-foundation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Coverage reports and gate
        shell: bash
        run: |
          ./gradlew \
            ai:testDebugUnitTest \
            app:testDebugUnitTest \
            data:testDebugUnitTest \
            domain:testDebugUnitTest \
            koverXmlReport \
            koverVerify \
            --stacktrace

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-coverage-reports
          if-no-files-found: ignore
          path: |
            **/build/reports/kover/**

      - name: Publish coverage summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Coverage"
            echo
            echo "Kover XML report generated at \`build/reports/kover/report.xml\`"
            echo "Coverage artifacts are attached to this workflow run."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish coverage report to PR
        if: always() && github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: ${{ github.workspace }}/build/reports/kover/report.xml
          token: ${{ github.token }}
          min-coverage-overall: 60
          min-coverage-changed-files: 60
          title: Coverage
          update-comment: true
          comment-type: both
